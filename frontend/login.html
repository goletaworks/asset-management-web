<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Management - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">Infrastructure Assets</h1>
      
      <!-- Login Form -->
      <div id="loginForm" class="auth-form">
        <h2>Sign In</h2>
        <div class="form-row">
          <label>Name or Email</label>
          <input type="text" id="loginName" placeholder="Enter your name or email" />
        </div>
        <div class="form-row">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" />
        </div>
        <button id="btnLogin" class="btn btn-primary btn-block">Login</button>
        <p class="auth-switch">
          First time? <a href="#" id="showRegister">Create an account</a>
        </p>
      </div>

      <!-- Registration Form -->
      <div id="registerForm" class="auth-form" style="display:none;">
        <h2>Create Account</h2>
        <div class="form-row">
          <label>Name*</label>
          <input type="text" id="regName" placeholder="Enter your name" />
        </div>
        <div class="form-row">
          <label>Email* (must be @ec.gc.ca)</label>
          <input type="email" id="regEmail" placeholder="user@ec.gc.ca" />
        </div>
        <div class="form-row">
          <label>Password*</label>
          <input type="password" id="regPassword" placeholder="Create password" />
        </div>
        <div class="form-row">
          <label>Reason for access*</label>
          <textarea id="regReason" placeholder="Tell us why you need access" rows="2"></textarea>
        </div>
        <div class="form-row">
          <label>Request Access From*</label>
          <select id="regApprover">
            <option value="Khodayar Ahktarhavari">Khodayar Ahktarhavari</option>
            <option value="Hiroki Haji">Hiroki Haji</option>
          </select>
          <p class="permission-info">
            New accounts are created with <strong>Read Only</strong> access.
            Your approver can grant additional permissions from the Users page after sign-in.
          </p>
        </div>
        <button id="btnSendRequest" class="btn btn-primary btn-block">Send Request</button>

        <div class="form-row">
          <label>Access Code</label>
          <input type="text" id="regAccessCode" placeholder="Enter the code provided by your approver" />
        </div>
        <button id="btnCreateAccount" class="btn btn-primary btn-block">Create Account</button>
        <p class="auth-switch">
          Have an account? <a href="#" id="showLogin">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script defer src="js/appAlert.js"></script>
  <script defer src="js/webApi.js"></script>
  <script defer src="js/login.js"></script>
</body>
</html>
